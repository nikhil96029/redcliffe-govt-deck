  <style>
    :root {
      --deck-width: 1920px;
      --deck-height: 1080px;
      --deck-scale: 1;
      --accent: #e9164e;
      --dot: rgba(255, 255, 255, 0.42);
      --dot-active: #e9164e;
      --motion: 760ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Poppins', system-ui, sans-serif;
    }

    body {
      position: relative;
    }

    .deck-root {
      position: fixed;
      inset: 0;
      background: #000;
    }

    .deck-stage {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--deck-width);
      height: var(--deck-height);
      transform: translate(-50%, -50%) scale(var(--deck-scale));
      transform-origin: center center;
      overflow: hidden;
      background: #000;
    }

    .slide-shell {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translate3d(8%, 0, 0);
      transition: transform var(--motion), opacity var(--motion);
      pointer-events: none;
      background: #000;
    }

    .slide-shell[data-state="active"] {
      opacity: 1;
      transform: translate3d(0, 0, 0);
      z-index: 3;
    }

    .slide-shell[data-state="before"] {
      opacity: 0;
      transform: translate3d(-8%, 0, 0);
      z-index: 2;
    }

    .slide-shell[data-state="after"] {
      opacity: 0;
      transform: translate3d(8%, 0, 0);
      z-index: 2;
    }

    .slide-shell[data-state="far-before"] {
      opacity: 0;
      transform: translate3d(-16%, 0, 0);
      z-index: 1;
    }

    .slide-shell[data-state="far-after"] {
      opacity: 0;
      transform: translate3d(16%, 0, 0);
      z-index: 1;
    }

    .slide-host {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .nav-hit {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 8;
    }

    .nav-hit.prev {
      left: 0;
      width: 15%;
      cursor: w-resize;
    }

    .nav-hit.next {
      right: 0;
      width: 85%;
      cursor: e-resize;
    }

    .dot-nav {
      position: fixed;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 100;
    }

    .dot-nav button {
      width: 14px;
      height: 14px;
      border: 0;
      padding: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      position: relative;
    }

    .dot-nav button::before,
    .dot-nav button::after {
      content: '';
      position: absolute;
      inset: 0;
      margin: auto;
      border-radius: 999px;
      transition: all 180ms ease;
    }

    .dot-nav button::before {
      width: 7px;
      height: 7px;
      background: var(--dot);
    }

    .dot-nav button::after {
      width: 14px;
      height: 14px;
      border: 1px solid transparent;
      opacity: 0;
    }

    .dot-nav button.active::before,
    .dot-nav button:hover::before {
      background: var(--dot-active);
      box-shadow: 0 0 14px rgba(233, 22, 78, 0.52);
    }

    .dot-nav button.active::after {
      border-color: rgba(233, 22, 78, 0.46);
      opacity: 1;
    }

    template {
      display: none;
    }

    @media (max-width: 980px) {
      .dot-nav {
        left: 50%;
        right: auto;
        bottom: 18px;
        top: auto;
        transform: translateX(-50%);
        flex-direction: row;
      }
    }
  </style>
</head>

<style>

    .grain{position:absolute;inset:0;mix-blend-mode:overlay;opacity:.10;pointer-events:none;z-index:2;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:256px;}

    .ff{font-family:'Fraunces',serif;}
    .cm{position:absolute;width:32px;height:32px;z-index:5;}
    .cm svg{width:32px;height:32px;}

    /* ── DYNAMIC EFFECTS ─────────────────────────────────────────── */
    /* 1. Logo halo beam — radial crimson ring behind each logo on entrance */
    .logo-halo{
      position:absolute;
      top:50%;left:50%;
      width:140px;height:140px;
      margin:-70px 0 0 -70px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(233,22,78,0.45) 0%, rgba(233,22,78,0.18) 40%, rgba(233,22,78,0) 70%);
      opacity:0;
      pointer-events:none;
      z-index:0;
    }
    :host(.animating) .logo-halo{
      animation: logoHalo 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: var(--halo-delay, 0s);
    }
    @keyframes logoHalo{
      0%{ opacity:0; transform:scale(0.45); }
      35%{ opacity:1; transform:scale(1.05); }
      100%{ opacity:0; transform:scale(1.9); }
    }

    /* 2. 2026 continuous pulse — halo ring that loops */
    [data-year-dot="2026"]{ position:absolute; }
    [data-year-dot="2026"]::before{
      content:'';
      position:absolute;
      inset:-6px;
      border-radius:50%;
      background:transparent;
      box-shadow:0 0 0 0 rgba(233,22,78,0.6);
      pointer-events:none;
      opacity:0;
    }
    :host(.animating) [data-year-dot="2026"]::before{
      animation: year2026Ring 2.4s ease-out infinite;
      animation-delay: 1.8s;
    }
    @keyframes year2026Ring{
      0%{ opacity:0.85; box-shadow:0 0 0 0 rgba(233,22,78,0.65); }
      80%{ opacity:0; box-shadow:0 0 0 22px rgba(233,22,78,0); }
      100%{ opacity:0; box-shadow:0 0 0 22px rgba(233,22,78,0); }
    }

    /* 3. Vertical timeline traveling sparkle — white dot descends 2021 → 2026 on entrance */
    .timeline-sparkle{
      position:absolute;
      left:32px;
      top:21px;
      width:14px;height:14px;
      border-radius:50%;
      background:#FFFFFF;
      box-shadow:0 0 10px #E9164E, 0 0 22px rgba(233,22,78,0.7), 0 0 36px rgba(233,22,78,0.4);
      opacity:0;
      pointer-events:none;
      z-index:4;
    }
    :host(.animating) .timeline-sparkle{
      animation: travelDown 3.2s cubic-bezier(0.4, 0.1, 0.4, 1) forwards;
      animation-delay: 1.4s;
    }
    @keyframes travelDown{
      0%{ top:21px; opacity:0; transform:scale(0.6); }
      8%{ opacity:1; transform:scale(1); }
      92%{ opacity:1; transform:scale(1); }
      100%{ top:519px; opacity:0; transform:scale(0.6); }
    }

    /* 4. Horizontal timeline connector line — draws left to right */
    .timeline-line{
      transform:scaleX(0);
      transform-origin: left center;
    }
    :host(.animating) .timeline-line{
      animation: drawRight 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.40s;
    }
    @keyframes drawRight{
      from{ transform:scaleX(0); }
      to{ transform:scaleX(1); }
    }

</style>

    function positionFor(current, target) {
      const delta = target - current;
      if (delta === 0) return 'active';
      if (delta === -1) return 'before';
      if (delta === 1) return 'after';
      return delta < 0 ? 'far-before' : 'far-after';
    }

    function byText(root, selector, text) {
      return Array.from(root.querySelectorAll(selector)).find((el) => (el.textContent || '').includes(text)) || null;
    }

    function mark(el, anim, delay) {
      if (!el) return;
      el.setAttribute('data-deck-anim', anim);
      el.style.setProperty('--deck-delay', `${delay}s`);
    }

    function pulse(el, delay = 0) {
      if (!el) return;
      el.setAttribute('data-deck-loop', 'pulse');
      el.style.setProperty('--deck-delay', `${delay}s`);
    }

    function stagger(elements, anim, start, step) {
      elements.filter(Boolean).forEach((el, idx) => mark(el, anim, start + idx * step));
    }

    function blink(el, delay = 0) {
      if (!el) return;
      el.setAttribute('data-deck-loop', 'blink');
      el.style.setProperty('--deck-delay', `${delay}s`);

    function kenBurns(el, delay = 0) {
      if (!el) return;
      const existing = el.getAttribute('data-deck-anim');
      if (!existing) el.setAttribute('data-deck-anim', 'soft-zoom');
      el.setAttribute('data-deck-loop', 'ken-burns');
      el.style.setProperty('--deck-delay', `${delay}s`);
    }

    function shimmer(el, delay = 0) {
      if (!el) return;
      el.setAttribute('data-deck-loop', 'shimmer');
      el.style.setProperty('--deck-delay', `${delay}s`);
    }

    function countUp(el, delay = 0, duration = 1.6) {
      if (!el) return;
      const raw = (el.textContent || '').trim();
      // Parse the number out while preserving prefix/suffix (e.g., "₹417Cr+" → prefix="₹", number=417, suffix="Cr+")
      const match = raw.match(/^([^\d\-]*)([\d.,]+)([^\d]*)$/);
      if (!match) return;
      const prefix = match[1];
      const numStr = match[2].replace(/,/g, '');
      const target = parseFloat(numStr);
      if (!Number.isFinite(target)) return;
      const suffix = match[3];
      const hasComma = match[2].includes(',');
      const decimals = (numStr.split('.')[1] || '').length;
      // Format a number like the original (commas, decimals)
      const format = (n) => {
        let s = decimals ? n.toFixed(decimals) : String(Math.round(n));
        if (hasComma) {
          const parts = s.split('.');
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
          s = parts.join('.');
        }
        return `${prefix}${s}${suffix}`;
      };
      el.textContent = format(0);
      const startMs = performance.now() + delay * 1000;
      function step(now) {
        if (now < startMs) { requestAnimationFrame(step); return; }
        const t = Math.min(1, (now - startMs) / (duration * 1000));
        const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
        el.textContent = format(target * ease);
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = format(target);
      }
      requestAnimationFrame(step);
    }

      if (index === 1) enhanceSlide3(root);
      if (index === 2) enhanceSlide2(root);
      if (index === 3) enhanceSlide4(root);
      if (index === 4) enhanceSlide5(root);
      if (index === 5) enhanceSlide6(root);
      if (index === 6) enhanceSlide7(root);
    }

    function buildDeck() {
      slides.forEach((slide, index) => {
        const shell = document.createElement('section');
        shell.className = 'slide-shell';
        shell.dataset.state = index === 0 ? 'active' : 'far-after';

        const host = document.createElement('div');
        host.className = 'slide-host';
        const shadow = host.attachShadow({ mode: 'open' });
        const animStyle = document.createElement('style');
        animStyle.textContent = baseAnimationCSS;
        shadow.appendChild(animStyle);
        shadow.appendChild(document.getElementById(slide.templateId).content.cloneNode(true));
        try { enhanceSlide(index, shadow); } catch (err) { console.error('enhanceSlide failed for index', index, err); }

        shell.appendChild(host);
        deckStage.insertBefore(shell, prevHit);
        state.shells.push(shell);
        state.roots.push(shadow);
        state.hosts.push(host);

        const dot = document.createElement('button');
        dot.type = 'button';
        dot.setAttribute('aria-label', `Go to slide ${index + 1}`);
        dot.addEventListener('click', () => goTo(index));
        dotNav.appendChild(dot);
        state.dots.push(dot);
      });
    }

    function updateHash(index) {
      const hash = `slide-${index + 1}`;
      if (location.hash !== `#${hash}`) {
        history.replaceState(null, '', `#${hash}`);
      }
    }

    function goTo(index) {
      const nextIndex = Math.max(0, Math.min(index, slides.length - 1));
      state.index = nextIndex;

      state.shells.forEach((shell, shellIndex) => {
        shell.dataset.state = positionFor(nextIndex, shellIndex);
      });

      state.dots.forEach((dot, dotIndex) => {
        dot.classList.toggle('active', dotIndex === nextIndex);
      });

      state.hosts.forEach((host, hostIndex) => {
        if (hostIndex === nextIndex) playHost(host);
        else resetHost(host);
      });

      updateHash(nextIndex);
    }

    function next() {
      if (state.index < slides.length - 1) goTo(state.index + 1);
    }

    function prev() {
      if (state.index > 0) goTo(state.index - 1);
    }

    function hashIndex() {
      const match = location.hash.match(/slide-(\d+)/i);
      if (!match) return 0;
      const parsed = Number(match[1]) - 1;
      if (!Number.isFinite(parsed)) return 0;
      return Math.max(0, Math.min(parsed, slides.length - 1));
    }

    function handleKeydown(event) {
      const key = event.key;
      if (key === ' ' || key === 'Spacebar' || key === 'ArrowRight' || key === 'PageDown') {
        event.preventDefault();
        next();
        return;
      }
      if (key === 'ArrowLeft' || key === 'PageUp' || key === 'Backspace') {
        event.preventDefault();
        prev();
        return;
      }
      if (key === 'Home') {
        event.preventDefault();
        goTo(0);
        return;
      }
      if (key === 'End') {
        event.preventDefault();
        goTo(slides.length - 1);
      }
    }

    prevHit.addEventListener('click', prev);
    nextHit.addEventListener('click', next);
    document.addEventListener('keydown', handleKeydown);
    window.addEventListener('resize', fitStage);
    window.addEventListener('hashchange', () => goTo(hashIndex()));

    document.addEventListener('touchstart', (event) => {
      state.touchStartX = event.changedTouches[0]?.clientX ?? null;
    }, { passive: true });

    document.addEventListener('touchend', (event) => {
      const endX = event.changedTouches[0]?.clientX;
      if (state.touchStartX == null || endX == null) return;
      const delta = endX - state.touchStartX;
      if (Math.abs(delta) > 48) {
        if (delta < 0) next();
        else prev();
      }
      state.touchStartX = null;
    }, { passive: true });

    buildDeck();
    fitStage();
    goTo(hashIndex());
  </script>
</body>
</html>
